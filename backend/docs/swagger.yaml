basePath: /
definitions:
  SvcWatch_internal_utils.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: SvcWatch is a real-time Nginx log monitoring system.
  title: SvcWatch API
  version: "1.0"
paths:
  /api/v1/sev/distribution:
    get:
      description: Get distribution of status codes for a time range
      parameters:
      - default: "2026-03-19 00:00:00"
        description: Start Time
        in: query
        name: start_time
        required: true
        type: string
      - default: "2026-03-20 00:00:00"
        description: End Time
        in: query
        name: end_time
        required: true
        type: string
      - description: Log File or Source ID (optional)
        in: query
        name: log_file
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SvcWatch_internal_utils.Response'
      security:
      - BearerAuth: []
      summary: Get HTTP status code distribution
      tags:
      - Monitor
  /api/v1/sev/logs:
    get:
      description: Query parsed Nginx logs with comprehensive filtering, sorting,
        and pagination
      parameters:
      - default: 1
        description: Page number (default 1)
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size (default 50, max 500)
        in: query
        name: size
        type: integer
      - description: Start Time
        example: "2026-03-19 00:00:00"
        in: query
        name: start_time
        type: string
      - description: End Time
        example: "2026-03-20 00:00:00"
        in: query
        name: end_time
        type: string
      - description: Log File or Source ID
        in: query
        name: source_id
        type: string
      - description: IP address (supports prefix match)
        example: 192.168.1.1
        in: query
        name: ip
        type: string
      - description: HTTP Method (e.g. GET)
        example: GET
        in: query
        name: method
        type: string
      - description: Exact HTTP Status (e.g. 500)
        example: 200
        in: query
        name: status
        type: integer
      - description: HTTP Status Class (e.g. 5xx)
        example: 5xx
        in: query
        name: status_class
        type: string
      - description: Keyword to search in URL path
        example: api
        in: query
        name: path_keyword
        type: string
      - description: Minimum Latency in ms
        example: 100
        in: query
        name: min_latency
        type: integer
      - description: Maximum Latency in ms
        example: 5000
        in: query
        name: max_latency
        type: integer
      - default: time_desc
        description: Sort order (time_desc or latency_desc)
        enum:
        - time_desc
        - latency_desc
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SvcWatch_internal_utils.Response'
      security:
      - BearerAuth: []
      summary: Query detailed logs
      tags:
      - Monitor
  /api/v1/sev/overview:
    get:
      description: Get overview statistics with comparison for a time range
      parameters:
      - default: "2026-03-19 00:00:00"
        description: Start Time
        in: query
        name: start_time
        required: true
        type: string
      - default: "2026-03-20 00:00:00"
        description: End Time
        in: query
        name: end_time
        required: true
        type: string
      - description: Log File or Source ID (optional)
        in: query
        name: log_file
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SvcWatch_internal_utils.Response'
      security:
      - BearerAuth: []
      summary: Get business overview key metrics
      tags:
      - Monitor
  /api/v1/sev/ping:
    get:
      description: Returns pong message to check if API is alive
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SvcWatch_internal_utils.Response'
      summary: Health Check
      tags:
      - System
  /api/v1/sev/stats:
    get:
      description: Get total logs count for all monitored tables
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SvcWatch_internal_utils.Response'
      security:
      - BearerAuth: []
      summary: Get aggregated logs statistics
      tags:
      - Monitor
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
