# SvcWatch monitoring dashboard
# Accessible at: https://passport.dongyuhan.com:8080
#
# Architecture:
#   External :8080 (HTTPS/SSL)
#       └── nginx (this config)
#               └── proxy_pass → Go app on localhost:8081 (internal)
#
# NOTE: port 443 on this domain belongs to the Passport auth service.
# This block deliberately uses port 8080 to avoid conflict.

server {
    server_name passport.dongyuhan.com;

    listen 8080 ssl;
    listen [::]:8080 ssl;

    # Reuse the SSL cert issued for passport.dongyuhan.com (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/passport.dongyuhan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/passport.dongyuhan.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
