name: Build and Deploy Backend

# ==============================================================================
# 🚀 SvcWatch Backend Deployment Workflow
# ==============================================================================
# ⚠️ MIGRATION & SETUP CHECKS:
# When moving to a new server, ensure these are configured in GitHub Settings:
#
# 1️⃣ REPOSITORY VARIABLES (Settings → Secrets and variables → Actions → Variables)
# - DEPLOY_TARGETS : JSON array of server configs. Example format:
#   [
#     {
#       "host": "1.1.1.1",
#       "user": "ubuntu",
#       "domain": "api.example.com",
#       "log_nginx": "/var/log/nginx/access.log",
#       "log_api": "/var/log/nginx/access_api.log"
#     }
#   ]
#
# 2️⃣ REPOSITORY SECRETS (Settings → Secrets and variables → Actions → Secrets)
# - SERVER_SSH_KEY      : (Private Key) Must be authorized on target servers.
# - AUTH_PASSPORT_URL   : Auth service token check endpoint.
# - AUTH_PERMISSION_URL : Auth service permission check endpoint.
# - AUTH_SYS_CODE       : System code identifier for auth service.
# - REDIS_ADDR          : Redis address (host:port).
# - REDIS_PASSWORD      : Redis password.
#
# 3️⃣ SERVER PREREQUISITES:
# - DNS must point <domain> to the server IP.
# - SSL cert must be issued via: sudo certbot --nginx -d <domain>
# - User (e.g. ubuntu) must have passwordless sudo for Nginx reloads.
# ==============================================================================

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  # ------------------------------------------
  # Job 1: Build the Go binary
  # ------------------------------------------
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Build binary (linux/amd64)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o svcwatch ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: svcwatch-binary
          path: backend/svcwatch

  # ------------------------------------------
  # Job 2: Build the deploy target matrix
  # ------------------------------------------
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          {
            echo 'matrix<<MATRIX_EOF'
            echo '${{ vars.DEPLOY_TARGETS }}'
            echo 'MATRIX_EOF'
          } >> $GITHUB_OUTPUT

  # ------------------------------------------
  # Job 3: Deploy to each server in parallel
  # ------------------------------------------
  deploy:
    needs: [ build, setup-matrix ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: svcwatch-binary
          path: ./

      - name: Stop existing process on ${{ matrix.server.host }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            pkill svcwatch || true
            sleep 1
            mkdir -p /home/${{ matrix.server.user }}/app/config

      - name: Copy binary to ${{ matrix.server.host }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "svcwatch"
          target: "/home/${{ matrix.server.user }}/app"

      - name: Copy production config to ${{ matrix.server.host }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/config/config.production.yaml"
          target: "/home/${{ matrix.server.user }}/app"
          strip_components: 2

      - name: Generate Nginx config & Start App on ${{ matrix.server.host }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            APP_DIR="/home/${{ matrix.server.user }}/app"
            DOMAIN="${{ matrix.server.domain }}"
            CERT_DIR="/etc/letsencrypt/live/$DOMAIN"

            chmod +x $APP_DIR/svcwatch

            if sudo test -f "$CERT_DIR/fullchain.pem"; then
              cat > /tmp/svcwatch_nginx.conf << NGINX_EOF
            server {
                server_name $DOMAIN;
                listen 8080 ssl;
                listen [::]:8080 ssl;
                ssl_certificate $CERT_DIR/fullchain.pem;
                ssl_certificate_key $CERT_DIR/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
                location / {
                    proxy_pass http://localhost:8081;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINX_EOF
              sudo cp /tmp/svcwatch_nginx.conf /etc/nginx/conf.d/svcwatch-backend.conf
              sudo nginx -t && sudo nginx -s reload
              echo "✅ Nginx configured for https://$DOMAIN:8080"
            else
              echo "⚠️ SSL cert not found at $CERT_DIR — skipping nginx config."
            fi

            cd $APP_DIR
            setsid env \
              APP_ENV=production \
              AUTH_PASSPORT_URL='${{ secrets.AUTH_PASSPORT_URL }}' \
              AUTH_PERMISSION_URL='${{ secrets.AUTH_PERMISSION_URL }}' \
              AUTH_SYS_CODE='${{ secrets.AUTH_SYS_CODE }}' \
              REDIS_ADDR='${{ secrets.REDIS_ADDR }}' \
              REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              LOG_PATH_NGINX='${{ matrix.server.log_nginx }}' \
              LOG_PATH_API='${{ matrix.server.log_api }}' \
              ./svcwatch < /dev/null > app.log 2>&1 &
            disown $!

            sleep 2
            pgrep -f svcwatch && echo "✅ SvcWatch is running" || echo "⚠️ Process not found!"
