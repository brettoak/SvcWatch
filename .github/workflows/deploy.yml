name: Build and Deploy

# ==========================================
# ⚠️ DEPLOYMENT & MIGRATION WARNING ⚠️
# If you are migrating this application to a new server or environment,
# you MUST update the corresponding GitHub Repository Secrets to match the
# new environment. Failure to do so will break the CI/CD pipeline.
#
# Required Secrets (Settings -> Secrets and variables -> Actions):
#
# Server access:
# - SERVER_SSH_KEY       : (Secret) Private SSH key — must be authorized on all servers
#
# App config:
# - AUTH_PASSPORT_URL   : (Secret) Auth service token check endpoint
# - AUTH_PERMISSION_URL : (Secret) Auth service permission check endpoint
# - AUTH_SYS_CODE       : (Secret) System code identifier
# - REDIS_ADDR          : (Secret) Redis address (host:port)
# - REDIS_PASSWORD      : (Secret) Redis password
#
# Per-server config — stored as a REPOSITORY VARIABLE (not Secret):
# ⚠️  Go to Settings → Secrets and variables → Actions → Variables tab
# - DEPLOY_TARGETS: JSON array, example:
#   [
#     {
#       "host": "1.2.3.4",
#       "user": "ubuntu",
#       "domain": "passport.dongyuhan.com",
#       "log_nginx": "/var/log/nginx/access.log",
#       "log_api": "/var/log/nginx/access_api.log"
#     },
#     {
#       "host": "5.6.7.8",
#       "user": "ubuntu",
#       "domain": "laravel.dongyuhan.com",
#       "log_nginx": "/var/log/nginx/access.log",
#       "log_api": "/var/log/nginx/access_api.log"
#     }
#   ]
#
# Why Variable and not Secret?
# GitHub masks Secret values in job outputs. If DEPLOY_TARGETS were a Secret,
# the setup-matrix output would be redacted as *** and fromJson() would fail.
# DEPLOY_TARGETS contains no sensitive data (IPs/domains/paths are non-secret).
#
# Required Manual Steps on FIRST deploy to each server:
# - Point DNS: <domain> → server IP
# - Issue SSL cert: certbot --nginx -d <domain>
# - Add the public key of SERVER_SSH_KEY to ~/.ssh/authorized_keys on each server
# - SvcWatch will be accessible at: https://<domain>:8080
# ==========================================

on:
  push:
    branches: [ "main" ]

jobs:
  # ------------------------------------------
  # Job 1: Build the Go binary
  # ------------------------------------------
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary (linux/amd64)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o svcwatch ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: svcwatch-binary
          path: svcwatch

  # ------------------------------------------
  # Job 2: Build the deploy target matrix
  # Use EOF delimiter to safely handle multiline secrets
  # ------------------------------------------
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          {
            echo 'matrix<<MATRIX_EOF'
            echo '${{ vars.DEPLOY_TARGETS }}'
            echo 'MATRIX_EOF'
          } >> $GITHUB_OUTPUT

  # ------------------------------------------
  # Job 3: Deploy to each server in parallel
  # ------------------------------------------
  deploy:
    needs: [ build, setup-matrix ]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        server: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: svcwatch-binary
          path: ./

      - name: Stop existing process on ${{ matrix.server.host }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            pkill -f svcwatch || true
            sleep 1
            # Ensure app directories exist
            mkdir -p /home/${{ matrix.server.user }}/app/config

      - name: Copy binary to ${{ matrix.server.host }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "svcwatch"
          target: "/home/${{ matrix.server.user }}/app"

      - name: Copy production config to ${{ matrix.server.host }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "config/config.production.yaml"
          target: "/home/${{ matrix.server.user }}/app"

      - name: Generate Nginx config & Start App on ${{ matrix.server.host }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ matrix.server.host }}
          username: ${{ matrix.server.user }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            APP_DIR="/home/${{ matrix.server.user }}/app"
            DOMAIN="${{ matrix.server.domain }}"
            CERT_DIR="/etc/letsencrypt/live/$DOMAIN"

            chmod +x $APP_DIR/svcwatch

            # Only configure nginx if SSL cert exists
            # Run: certbot --nginx -d <domain>  on first deploy to issue the cert
            if [ -f "$CERT_DIR/fullchain.pem" ]; then
              cat > /tmp/svcwatch_nginx.conf << NGINX_EOF
            server {
                server_name $DOMAIN;

                listen 8080 ssl;
                listen [::]:8080 ssl;

                ssl_certificate $CERT_DIR/fullchain.pem;
                ssl_certificate_key $CERT_DIR/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                location / {
                    proxy_pass http://localhost:8081;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINX_EOF
              sudo cp /tmp/svcwatch_nginx.conf /etc/nginx/conf.d/svcwatch.conf
              sudo nginx -t && sudo nginx -s reload
              echo "✅ Nginx configured for https://$DOMAIN:8080"
            else
              echo "⚠️  SSL cert not found at $CERT_DIR — skipping nginx config."
              echo "   Run: sudo certbot --nginx -d $DOMAIN  to issue the cert."
            fi

            # Start the application
            cd $APP_DIR
            nohup env \
              APP_ENV=production \
              AUTH_PASSPORT_URL='${{ secrets.AUTH_PASSPORT_URL }}' \
              AUTH_PERMISSION_URL='${{ secrets.AUTH_PERMISSION_URL }}' \
              AUTH_SYS_CODE='${{ secrets.AUTH_SYS_CODE }}' \
              REDIS_ADDR='${{ secrets.REDIS_ADDR }}' \
              REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              LOG_PATH_NGINX='${{ matrix.server.log_nginx }}' \
              LOG_PATH_API='${{ matrix.server.log_api }}' \
              ./svcwatch > app.log 2>&1 &

            sleep 2
            pgrep -f svcwatch && echo "✅ SvcWatch is running" || echo "⚠️ Process not found — check app.log"
